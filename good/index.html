<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SHA‑256 GOOD Pipeline Demo</title>
  <style>
    /* Base layout */
    body {
    font-family: system-ui, sans-serif;
    background: #181a1f;
    color: #e6e6e6;
    margin: 0;
    padding: 0;
    }

    /* Centered container */
    .container {
    max-width: 720px;
    margin: 50px auto;
    padding: 30px;
    background: #23252b;
    border-radius: 10px;
    box-shadow: 0 0 25px rgba(0,0,0,0.45);
    }

    /* Headings */
    h1 {
    margin: 0;
    font-weight: 600;
    text-align: center;
    color: #fafafa;
    }

    h2 {
    margin-top: 0;
    font-weight: 500;
    color: #f0f0f0;
    }

    .subtitle {
    text-align: center;
    margin-top: 6px;
    margin-bottom: 30px;
    font-size: 14px;
    color: #9a9a9a;
    }

    /* Input fields */
    textarea {
    width: 100%;
    padding: 12px;
    background: #1a1c21;
    border: 1px solid #3a3d44;
    border-radius: 6px;
    color: #fff;
    font-size: 15px;
    transition: border-color 0.15s ease;
    resize: vertical;
    }

    textarea:focus {
    outline: none;
    border-color: #4ac;
    }

    /* Button */
    button {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: #4ac;
    border: none;
    border-radius: 6px;
    font-size: 17px;
    color: #000;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s ease;
    }

    button:hover {
    background: #5bd;
    }

    /* Output blocks */
    pre {
    background: #1a1c21;
    border: 1px solid #3a3d44;
    color: #e6e6e6;
    padding: 14px;
    border-radius: 6px;
    white-space: pre-wrap;
    overflow-x: auto;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.4;
    margin-top: 16px;
    }
  </style>
</head>
<body>

<h1>SHA‑256 GOOD‑Pipeline Demo</h1>

<div class="section">
  <h3>Input message (first 64 bytes only)</h3>
  <textarea id="msg"></textarea>
  <button onclick="runGood()">Run GOOD Pipeline</button>
</div>

<div class="section">
  <h3>Dependency graph</h3>
  <pre id="deps"></pre>
</div>

<div class="section">
  <h3>GOOD‑pipeline log</h3>
  <pre id="log"></pre>
</div>

<!-- Load primitives and wrapper -->
<script src="../substrate/atom-pi.js"></script>
<script src="sha256_good.js"></script>
<script src="dep_graph_web.js"></script>

<!-- Demo logic -->
<script src="demo_good_only.js"></script>

</body>
</html>
